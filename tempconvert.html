<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter — Steve's</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    /* ── Design Tokens ── */
    :root {
      --color-brand-100: #a5b4fc;
      --color-brand-300: #818cf8;
      --color-brand-500: #6366f1;
      --color-brand-gradient: linear-gradient(135deg, #a5b4fc 0%, #818cf8 40%, #6366f1 100%);
      --color-brand-gradient-simple: linear-gradient(135deg, #6366f1, #818cf8);

      --color-bg:               #f0f2f5;
      --color-surface:          #ffffff;
      --color-text-primary:     #1a1a2e;
      --color-text-body:        #1e293b;
      --color-text-secondary:   #64748b;
      --color-text-muted:       #94a3b8;
      --color-text-faint:       #cbd5e1;
      --color-border:           #e2e8f0;
      --color-border-light:     #f1f5f9;
      --color-input-bg:         #f8fafc;

      --color-header-from: #1e293b;
      --color-header-to:   #0f172a;

      --color-danger:        #dc2626;
      --color-danger-bg:     #fef2f2;
      --color-danger-border: #fca5a5;
      --color-warning:       #d97706;
      --color-warning-bg:    #fffbeb;
      --color-info:          #3b82f6;
      --color-info-bg:       #eff6ff;
      --color-success:       #059669;
      --color-success-bg:    #ecfdf5;
      --color-success-border:#6ee7b7;

      --color-action-from: #f97316;
      --color-action-to:   #ea580c;

      --radius-sm:  6px;
      --radius-md:  8px;
      --radius-lg:  10px;
      --radius-xl:  12px;
      --radius-2xl: 16px;
      --radius-pill: 20px;

      --shadow-card:        0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-focus:       0 0 0 3px rgba(99,102,241,0.12);
      --shadow-brand:       0 2px 8px rgba(99,102,241,0.35);
      --shadow-brand-hover: 0 4px 14px rgba(99,102,241,0.4);

      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-size-xs:   11px;
      --font-size-sm:   12px;
      --font-size-md:   13px;
      --font-size-base: 14px;
      --font-size-lg:   15px;

      --transition-fast: 0.12s;
      --transition-base: 0.15s;

      --max-width: 520px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Hero Header ── */
    .hero {
      background: linear-gradient(135deg, var(--color-header-from) 0%, var(--color-header-to) 100%);
      padding: 3rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: rgba(99,102,241,0.15);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -80px; left: 30%;
      width: 300px; height: 300px;
      background: rgba(99,102,241,0.08);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-eyebrow {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .hero-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      background: var(--color-brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .hero-subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
    }

    /* ── Main Layout ── */
    .main {
      max-width: var(--max-width);
      margin: -2rem auto 0;
      padding: 0 1rem;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-card);
      padding: 1.75rem;
    }
    .card-title {
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--color-border-light);
    }

    /* ── Converter Layout ── */
    .converter-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: end;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-label {
      font-size: var(--font-size-sm);
      font-weight: 600;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-label .unit-badge {
      font-size: var(--font-size-xs);
      font-weight: 700;
      padding: 2px 7px;
      border-radius: var(--radius-pill);
      background: #ede9fe;
      color: var(--color-brand-500);
    }
    .field {
      font-family: var(--font-family);
      font-size: 22px;
      font-weight: 700;
      padding: 12px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-input-bg);
      color: var(--color-text-primary);
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
      outline: none;
      width: 100%;
      letter-spacing: -0.5px;
    }
    .field:focus {
      border-color: var(--color-brand-500);
      box-shadow: var(--shadow-focus);
      background: var(--color-surface);
    }
    .field::placeholder {
      font-weight: 400;
      font-size: var(--font-size-base);
      color: var(--color-text-faint);
    }
    .field.result-field {
      background: #f5f3ff;
      border-color: #ddd6fe;
      color: var(--color-brand-500);
      cursor: default;
    }

    /* ── Swap button ── */
    .swap-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 2px;
    }
    .btn-swap {
      background: var(--color-brand-gradient-simple);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-brand);
      transition: transform var(--transition-base), box-shadow var(--transition-base), opacity var(--transition-base);
      flex-shrink: 0;
    }
    .btn-swap:hover  { opacity: 0.9; box-shadow: var(--shadow-brand-hover); }
    .btn-swap:active { transform: scale(0.93); }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
    .tab {
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-base);
    }
    .tab:hover { background: var(--color-input-bg); }
    .tab.active {
      background: var(--color-brand-gradient-simple);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-brand);
    }

    /* ── Quick reference table ── */
    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--font-size-base);
    }
    .ref-table thead th {
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      text-align: left;
      padding: 0 8px 10px;
      border-bottom: 1px solid var(--color-border-light);
    }
    .ref-table tbody tr {
      border-bottom: 1px solid var(--color-border-light);
      transition: background var(--transition-fast);
      cursor: pointer;
    }
    .ref-table tbody tr:last-child { border-bottom: none; }
    .ref-table tbody tr:hover { background: #f5f3ff; }
    .ref-table tbody td {
      padding: 9px 8px;
      color: var(--color-text-body);
      font-weight: 500;
    }
    .ref-table .td-label {
      color: var(--color-text-secondary);
      font-weight: 400;
      font-size: var(--font-size-md);
    }
    .ref-table .td-c { color: var(--color-brand-500); font-weight: 700; }
    .ref-table .td-f { color: var(--color-warning); font-weight: 700; }

    /* ── Formula card ── */
    .formula-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .formula-item {
      background: var(--color-input-bg);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .formula-direction {
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      min-width: 60px;
    }
    .formula-expr {
      font-family: 'Courier New', monospace;
      font-size: var(--font-size-base);
      font-weight: 600;
      color: var(--color-text-primary);
      flex: 1;
    }

    /* ── Result callout ── */
    .result-callout {
      display: none;
      margin-top: 1.25rem;
      padding: 14px 16px;
      border-radius: var(--radius-xl);
      background: #f5f3ff;
      border: 1.5px solid #ddd6fe;
      align-items: center;
      gap: 10px;
    }
    .result-callout.visible { display: flex; }
    .result-callout .result-icon { font-size: 20px; }
    .result-callout .result-text {
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--color-brand-500);
      flex: 1;
    }
    .result-callout .result-sub {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      font-weight: 400;
    }

    /* ── Clear button ── */
    .btn-clear {
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 500;
      padding: 6px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast);
      margin-top: 1rem;
    }
    .btn-clear:hover { background: var(--color-input-bg); }

    @media (max-width: 480px) {
      .hero-title { font-size: 32px; }
      .converter-grid { grid-template-columns: 1fr; }
      .swap-col { transform: rotate(90deg); }
    }
  </style>
</head>
<body>

  <!-- Hero Header -->
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">Steve's</div>
      <div class="hero-title">Temp Convert</div>
      <div class="hero-subtitle">Celsius ↔ Fahrenheit converter</div>
    </div>
  </header>

  <main class="main">

    <!-- Converter Card -->
    <div class="card">
      <div class="card-title">Convert Temperature</div>

      <!-- Mode Tabs -->
      <div class="mode-tabs">
        <button class="tab active" id="tab-cf" onclick="setMode('cf')">°C → °F</button>
        <button class="tab" id="tab-fc" onclick="setMode('fc')">°F → °C</button>
      </div>

      <div class="converter-grid">
        <!-- Input side -->
        <div class="input-group">
          <label class="input-label" for="inputVal">
            <span id="inputUnitBadge" class="unit-badge">°C</span>
            <span id="inputUnitLabel">Celsius</span>
          </label>
          <input
            type="number"
            id="inputVal"
            class="field"
            placeholder="Enter value"
            oninput="convert()"
            autocomplete="off"
          >
        </div>

        <!-- Swap button -->
        <div class="swap-col">
          <button class="btn-swap" onclick="swap()" title="Swap direction">⇄</button>
        </div>

        <!-- Output side -->
        <div class="input-group">
          <label class="input-label">
            <span id="outputUnitBadge" class="unit-badge" style="background:#fff7ed;color:#f97316;">°F</span>
            <span id="outputUnitLabel">Fahrenheit</span>
          </label>
          <input
            type="text"
            id="outputVal"
            class="field result-field"
            placeholder="Result"
            readonly
          >
        </div>
      </div>

      <!-- Result Callout -->
      <div class="result-callout" id="resultCallout">
        <span class="result-icon">🌡️</span>
        <div>
          <div class="result-text" id="resultText"></div>
          <div class="result-sub" id="resultSub"></div>
        </div>
      </div>

      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <!-- Quick Reference Card -->
    <div class="card">
      <div class="card-title">Quick Reference</div>
      <table class="ref-table">
        <thead>
          <tr>
            <th>Reference point</th>
            <th>°C</th>
            <th>°F</th>
          </tr>
        </thead>
        <tbody id="refTableBody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>

    <!-- Formula Card -->
    <div class="card">
      <div class="card-title">Formulas</div>
      <div class="formula-row">
        <div class="formula-item">
          <span class="formula-direction">°C → °F</span>
          <span class="formula-expr">°F = (°C × 9/5) + 32</span>
        </div>
        <div class="formula-item">
          <span class="formula-direction">°F → °C</span>
          <span class="formula-expr">°C = (°F − 32) × 5/9</span>
        </div>
      </div>
    </div>

  </main>

  <script>
    // ── State ──
    let mode = 'cf'; // 'cf' = Celsius→Fahrenheit, 'fc' = Fahrenheit→Celsius

    const referencePoints = [
      { label: 'Absolute zero',       c: -273.15, f: -459.67 },
      { label: 'Water freezes',        c: 0,       f: 32      },
      { label: 'Room temperature',     c: 20,      f: 68      },
      { label: 'Body temperature',     c: 37,      f: 98.6    },
      { label: 'Hot summer day (AU)',  c: 40,      f: 104     },
      { label: 'Water boils',          c: 100,     f: 212     },
    ];

    // ── Build reference table ──
    function buildRefTable() {
      const tbody = document.getElementById('refTableBody');
      tbody.innerHTML = referencePoints.map(p => `
        <tr onclick="useReference(${p.c})">
          <td class="td-label">${p.label}</td>
          <td class="td-c">${p.c}°</td>
          <td class="td-f">${p.f}°</td>
        </tr>
      `).join('');
    }

    // ── Use a reference value ──
    function useReference(celsius) {
      if (mode === 'cf') {
        document.getElementById('inputVal').value = celsius;
      } else {
        // convert celsius to fahrenheit for the fahrenheit input
        document.getElementById('inputVal').value = round(celsiusToFahrenheit(celsius));
      }
      convert();
    }

    // ── Conversion functions ──
    function celsiusToFahrenheit(c) { return (c * 9/5) + 32; }
    function fahrenheitToCelsius(f) { return (f - 32) * 5/9; }
    function round(n)               { return Math.round(n * 100) / 100; }

    // ── Main convert ──
    function convert() {
      const raw = document.getElementById('inputVal').value;
      const outputEl = document.getElementById('outputVal');
      const callout  = document.getElementById('resultCallout');
      const resultText = document.getElementById('resultText');
      const resultSub  = document.getElementById('resultSub');

      if (raw === '' || isNaN(parseFloat(raw))) {
        outputEl.value = '';
        callout.classList.remove('visible');
        return;
      }

      const input = parseFloat(raw);
      let result, fromUnit, toUnit, description;

      if (mode === 'cf') {
        result    = round(celsiusToFahrenheit(input));
        fromUnit  = '°C';
        toUnit    = '°F';
        description = getDescription(input, 'c');
      } else {
        result    = round(fahrenheitToCelsius(input));
        fromUnit  = '°F';
        toUnit    = '°C';
        description = getDescription(result, 'c');
      }

      outputEl.value = result;
      resultText.textContent = `${input}${fromUnit}  =  ${result}${toUnit}`;
      resultSub.textContent  = description;
      callout.classList.add('visible');
    }

    // ── Human description of temperature ──
    function getDescription(celsius, _) {
      if      (celsius <= -273.15) return 'Absolute zero — nothing colder exists.';
      else if (celsius < -40)      return 'Extremely dangerous cold — polar conditions.';
      else if (celsius < 0)        return 'Below freezing — ice and frost conditions.';
      else if (celsius < 10)       return 'Very cold — wrap up warm.';
      else if (celsius < 18)       return 'Cool — a light jacket is a good idea.';
      else if (celsius < 24)       return 'Comfortable room temperature.';
      else if (celsius < 30)       return 'Warm — a pleasant Australian day.';
      else if (celsius < 36)       return 'Hot — stay hydrated.';
      else if (celsius < 40)       return 'Very hot — heatwave territory.';
      else if (celsius < 100)      return 'Dangerously hot — extreme caution required.';
      else                         return 'At or above water\'s boiling point (100°C).';
    }

    // ── Mode switch ──
    function setMode(newMode) {
      mode = newMode;
      clearAll();

      const inputBadge  = document.getElementById('inputUnitBadge');
      const inputLabel  = document.getElementById('inputUnitLabel');
      const outputBadge = document.getElementById('outputUnitBadge');
      const outputLabel = document.getElementById('outputUnitLabel');

      if (mode === 'cf') {
        inputBadge.textContent  = '°C';
        inputBadge.style.cssText = 'background:#ede9fe;color:#6366f1;';
        inputLabel.textContent  = 'Celsius';
        outputBadge.textContent = '°F';
        outputBadge.style.cssText = 'background:#fff7ed;color:#f97316;';
        outputLabel.textContent = 'Fahrenheit';
      } else {
        inputBadge.textContent  = '°F';
        inputBadge.style.cssText = 'background:#fff7ed;color:#f97316;';
        inputLabel.textContent  = 'Fahrenheit';
        outputBadge.textContent = '°C';
        outputBadge.style.cssText = 'background:#ede9fe;color:#6366f1;';
        outputLabel.textContent = 'Celsius';
      }

      document.getElementById('tab-cf').classList.toggle('active', mode === 'cf');
      document.getElementById('tab-fc').classList.toggle('active', mode === 'fc');
    }

    // ── Swap direction ──
    function swap() {
      const currentInput = document.getElementById('inputVal').value;
      const currentOutput = document.getElementById('outputVal').value;
      setMode(mode === 'cf' ? 'fc' : 'cf');
      if (currentOutput !== '') {
        document.getElementById('inputVal').value = currentOutput;
        convert();
      }
    }

    // ── Clear ──
    function clearAll() {
      document.getElementById('inputVal').value  = '';
      document.getElementById('outputVal').value = '';
      document.getElementById('resultCallout').classList.remove('visible');
    }

    // ── Init ──
    buildRefTable();
  </script>
</body>
</html>
