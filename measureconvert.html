<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Measurement Converter v1.2.0 — Steve's Projects</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    /* ── Design Tokens ── */
    :root {
      --color-brand-100: #a5b4fc;
      --color-brand-300: #818cf8;
      --color-brand-500: #6366f1;
      --color-brand-gradient: linear-gradient(135deg, #a5b4fc 0%, #818cf8 40%, #6366f1 100%);
      --color-brand-gradient-simple: linear-gradient(135deg, #6366f1, #818cf8);

      --color-bg:               #f0f2f5;
      --color-surface:          #ffffff;
      --color-text-primary:     #1a1a2e;
      --color-text-body:        #1e293b;
      --color-text-secondary:   #64748b;
      --color-text-muted:       #94a3b8;
      --color-text-faint:       #cbd5e1;
      --color-border:           #e2e8f0;
      --color-border-light:     #f1f5f9;
      --color-input-bg:         #f8fafc;

      --color-header-from: #1e293b;
      --color-header-to:   #0f172a;

      --color-warning:       #b45309;

      --radius-sm:  6px;
      --radius-md:  8px;
      --radius-lg:  10px;
      --radius-xl:  12px;
      --radius-2xl: 16px;
      --radius-pill: 20px;

      --shadow-card:        0 4px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-focus:       0 0 0 3px rgba(99,102,241,0.12);
      --shadow-brand:       0 2px 8px rgba(99,102,241,0.35);
      --shadow-brand-hover: 0 4px 14px rgba(99,102,241,0.4);

      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-size-xs:   11px;
      --font-size-sm:   12px;
      --font-size-md:   13px;
      --font-size-base: 14px;
      --font-size-lg:   15px;

      --transition-fast: 0.12s;
      --transition-base: 0.15s;

      --max-width: 560px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Screen-reader only utility ── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Hero Header ── */
    .hero {
      background: linear-gradient(135deg, var(--color-header-from) 0%, var(--color-header-to) 100%);
      padding: 3rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: rgba(99,102,241,0.15);
      border-radius: 50%;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -80px; left: 30%;
      width: 300px; height: 300px;
      background: rgba(99,102,241,0.08);
      border-radius: 50%;
    }
    .hero-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .hero-eyebrow {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .version-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      background: rgba(99,102,241,0.35);
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.05em;
    }
    .hero-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      background: var(--color-brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .hero-subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
    }
    .hero-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color var(--transition-base);
    }
    .hero-link:hover { color: rgba(255,255,255,0.85); }

    /* ── Main Layout ── */
    .main {
      max-width: var(--max-width);
      margin: -2rem auto 0;
      padding: 0 1rem;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-card);
      padding: 1.75rem;
    }
    .card-title {
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--color-border-light);
    }

    /* ── Category Tabs ── */
    .cat-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 600;
      padding: 7px 13px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all var(--transition-base);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .cat-tab:hover { background: var(--color-input-bg); }
    .cat-tab.active {
      background: var(--color-brand-gradient-simple);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-brand);
    }

    /* ── Converter Layout ── */
    .converter-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: start;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── Unit Select ── */
    .unit-select {
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 600;
      padding: 7px 10px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-input-bg);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
      outline: none;
      width: 100%;
    }
    .unit-select:focus {
      border-color: var(--color-brand-500);
      box-shadow: var(--shadow-focus);
    }
    .unit-select.result-select {
      background: #f5f3ff;
      border-color: #ddd6fe;
      color: var(--color-brand-500);
    }

    /* ── Number Fields ── */
    .field {
      font-family: var(--font-family);
      font-size: 22px;
      font-weight: 700;
      padding: 12px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-input-bg);
      color: var(--color-text-primary);
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
      outline: none;
      width: 100%;
      letter-spacing: -0.5px;
    }
    .field:focus {
      border-color: var(--color-brand-500);
      box-shadow: var(--shadow-focus);
      background: var(--color-surface);
    }
    .field::placeholder {
      font-weight: 400;
      font-size: var(--font-size-base);
      color: var(--color-text-faint);
    }
    .field.result-field {
      background: #f5f3ff;
      border-color: #ddd6fe;
      color: var(--color-brand-500);
      cursor: default;
    }
    .field.field--warning {
      border-color: var(--color-warning);
      box-shadow: 0 0 0 3px rgba(217,119,6,0.12);
    }

    /* ── Input warning message ── */
    .input-warning-msg {
      font-size: var(--font-size-xs);
      color: var(--color-warning);
      font-weight: 500;
      display: none;
    }
    .input-warning-msg.visible { display: block; }

    /* ── Swap Button ── */
    .swap-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 34px;
    }
    .btn-swap {
      background: var(--color-brand-gradient-simple);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-brand);
      transition: transform var(--transition-base), box-shadow var(--transition-base), opacity var(--transition-base);
      flex-shrink: 0;
    }
    .btn-swap:hover  { opacity: 0.9; box-shadow: var(--shadow-brand-hover); }
    .btn-swap:active { transform: scale(0.93); }

    /* ── Result Callout ── */
    .result-callout {
      display: none;
      margin-top: 1.25rem;
      padding: 14px 16px;
      border-radius: var(--radius-xl);
      background: #f5f3ff;
      border: 1.5px solid #ddd6fe;
      align-items: center;
      gap: 10px;
    }
    .result-callout.visible { display: flex; }
    .result-callout .result-icon { font-size: 20px; flex-shrink: 0; }
    .result-callout .result-text {
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--color-brand-500);
    }
    .result-callout .result-sub {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      font-weight: 400;
    }

    /* ── Copy Button ── */
    .btn-copy {
      font-family: var(--font-family);
      font-size: var(--font-size-xs);
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-md);
      border: 1.5px solid #ddd6fe;
      background: transparent;
      color: var(--color-brand-500);
      cursor: pointer;
      transition: background var(--transition-fast);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-copy:hover { background: #ede9fe; }

    /* ── Clear Button ── */
    .btn-clear {
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 500;
      padding: 6px 16px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background var(--transition-fast);
      margin-top: 1rem;
    }
    .btn-clear:hover { background: var(--color-input-bg); }

    /* ── Reference Table ── */
    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--font-size-base);
    }
    .ref-table thead th {
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      text-align: left;
      padding: 0 8px 10px;
      border-bottom: 1px solid var(--color-border-light);
    }
    .ref-table tbody tr {
      border-bottom: 1px solid var(--color-border-light);
      transition: background var(--transition-fast);
      cursor: pointer;
    }
    .ref-table tbody tr:last-child { border-bottom: none; }
    .ref-table tbody tr:hover { background: #f5f3ff; }
    .ref-table tbody td {
      padding: 9px 8px;
      color: var(--color-text-body);
      font-weight: 500;
    }
    .ref-table .td-label   { color: var(--color-text-secondary); font-weight: 400; font-size: var(--font-size-md); }
    .ref-table .td-metric  { color: var(--color-brand-500); font-weight: 700; }
    .ref-table .td-imperial{ color: var(--color-warning); font-weight: 700; }

    /* ── Reference tip ── */
    .ref-tip {
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      margin-top: 10px;
    }

    /* ── Formula Card ── */
    .formula-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .formula-item {
      background: var(--color-input-bg);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .formula-direction {
      font-size: var(--font-size-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      min-width: 70px;
    }
    .formula-expr {
      font-family: 'Courier New', monospace;
      font-size: var(--font-size-base);
      font-weight: 600;
      color: var(--color-text-primary);
      flex: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .hero-title { font-size: 32px; }
      .converter-grid { grid-template-columns: 1fr; }
      .swap-col { transform: rotate(90deg); padding-top: 0; justify-content: center; }
    }

    /* ── Focus visible rings ── */
    .cat-tab:focus-visible,
    .btn-swap:focus-visible,
    .btn-clear:focus-visible,
    .btn-copy:focus-visible {
      outline: 2px solid var(--color-brand-500);
      outline-offset: 2px;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
      .btn-swap:active { transform: none; }
    }
  </style>
</head>
<body>

  <!-- Hero Header -->
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">
        Steve's Projects
        <span class="version-badge">v1.2.0</span>
      </div>
      <div class="hero-title">Measurement Convert</div>
      <div class="hero-subtitle">Metric ↔ Imperial converter</div>
      <a href="tempconvert.html" class="hero-link">Also: Temperature Converter →</a>
    </div>
  </header>

  <main class="main">

    <!-- Converter Card -->
    <div class="card">
      <div class="card-title">Convert Measurement</div>

      <!-- Category Tabs -->
      <div class="cat-tabs" id="catTabs" role="tablist" aria-label="Measurement categories"></div>

      <div class="converter-grid">
        <!-- From -->
        <div class="input-group">
          <label for="fromUnit" class="sr-only">From unit</label>
          <select id="fromUnit" class="unit-select"></select>
          <label for="inputVal" class="sr-only">Value to convert</label>
          <input
            type="number"
            id="inputVal"
            class="field"
            placeholder="Enter value"
            autocomplete="off"
          >
          <span class="input-warning-msg" id="negativeWarning" role="alert">Value must be zero or greater.</span>
        </div>

        <!-- Swap -->
        <div class="swap-col">
          <button class="btn-swap" id="swapBtn" title="Swap units" aria-label="Swap units">⇄</button>
        </div>

        <!-- To -->
        <div class="input-group">
          <label for="toUnit" class="sr-only">To unit</label>
          <select id="toUnit" class="unit-select result-select"></select>
          <input
            type="text"
            id="outputVal"
            class="field result-field"
            placeholder="Result"
            readonly
            aria-label="Converted result"
          >
        </div>
      </div>

      <!-- Result Callout -->
      <div class="result-callout" id="resultCallout" aria-live="polite" aria-atomic="true">
        <span class="result-icon" id="resultIcon">📏</span>
        <div style="flex:1">
          <div class="result-text" id="resultText"></div>
          <div class="result-sub"  id="resultSub"></div>
        </div>
        <button class="btn-copy" id="copyBtn" title="Copy result" aria-label="Copy result to clipboard">Copy</button>
      </div>

      <button class="btn-clear" id="clearBtn">Clear</button>
    </div>

    <!-- Reference Card -->
    <div class="card">
      <div class="card-title">Quick Reference <span id="refCatName" style="text-transform:none;letter-spacing:0"></span></div>
      <table class="ref-table">
        <thead>
          <tr>
            <th>Reference point</th>
            <th>Metric</th>
            <th>Imperial</th>
          </tr>
        </thead>
        <tbody id="refTableBody"></tbody>
      </table>
      <p class="ref-tip">Tap a row to load the value into the converter.</p>
    </div>

    <!-- Formula Card -->
    <div class="card">
      <div class="card-title">Conversion Formula</div>
      <div class="formula-row" id="formulaRow"></div>
    </div>

  </main>

  <script>

          { label: 'Space shuttle (orbit)',      value: 28000, unitId: 'kmh', metricDisp: '28,000 km/h', imperialDisp: '17,398 mph' },

      },
      {
        id: 'fuel', name: 'Fuel', icon: '⛽',
        // Note: factor is null — fuel uses inverse conversion via convertFuel()
        units: [
          { id: 'l100km', label: 'L/100km',    sym: 'L/100km',  factor: null, type: 'metric'   },
          { id: 'mpg_us', label: 'MPG (US)',    sym: 'mpg (US)', factor: null, type: 'imperial' },
          { id: 'mpg_uk', label: 'MPG (Imp)',   sym: 'mpg (UK)', factor: null, type: 'imperial' },
        ],
        defaultFrom: 'l100km', defaultTo: 'mpg_us',
        references: [
          { label: 'Small city car (AU)',    value: 6.5,  unitId: 'l100km', metricDisp: '6.5 L/100km',   imperialDisp: '36.2 mpg (US)' },
          { label: 'Average SUV (AU)',       value: 10,   unitId: 'l100km', metricDisp: '10 L/100km',     imperialDisp: '23.5 mpg (US)' },
          { label: 'V8 ute',                value: 15,   unitId: 'l100km', metricDisp: '15 L/100km',     imperialDisp: '15.7 mpg (US)' },
          { label: 'Hybrid (e.g. Prius)',   value: 4.5,  unitId: 'l100km', metricDisp: '4.5 L/100km',    imperialDisp: '52.3 mpg (US)' },
          { label: 'Australian avg (2024)', value: 11.1, unitId: 'l100km', metricDisp: '11.1 L/100km',   imperialDisp: '21.2 mpg (US)' },
          { label: 'US CAFE standard',      value: 8.7,  unitId: 'l100km', metricDisp: '8.7 L/100km',    imperialDisp: '27 mpg (US)'   },
        ],
      },
    ];

    // ─────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────
    let currentCatId = 'length';

    // ─────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────
    function getCat() {
      return CATEGORIES.find(c => c.id === currentCatId);
    }

    function smartRound(n) {
      if (n === 0) return 0;
      const abs = Math.abs(n);
      if (abs >= 10000) return Math.round(n * 10) / 10;
      if (abs >= 1000)  return Math.round(n * 100) / 100;
      if (abs >= 100)   return Math.round(n * 1000) / 1000;
      if (abs >= 10)    return Math.round(n * 10000) / 10000;
      if (abs >= 1)     return Math.round(n * 100000) / 100000;
      if (abs >= 0.1)   return Math.round(n * 1000000) / 1000000;
      return parseFloat(n.toPrecision(6));
    }

    function fmtNum(n) {
      const r = smartRound(n);
      return r.toLocaleString('en-AU', { maximumFractionDigits: 8 });
    }

    // Fuel efficiency: inverse relationship — cannot use simple factor multiplication.
    // 1 L/100km = 235.214583 US mpg = 282.480936 UK mpg
    const FUEL_US_PER_L100 = 235.214583;
    const FUEL_UK_PER_L100 = 282.480936;

    function convertFuel(value, fromId, toId) {
      // Normalise to L/100km first
      let l100;
      if      (fromId === 'l100km') l100 = value;
      else if (fromId === 'mpg_us') l100 = FUEL_US_PER_L100 / value;
      else if (fromId === 'mpg_uk') l100 = FUEL_UK_PER_L100 / value;
      // Convert to target
      if (toId === 'l100km') return l100;
      if (toId === 'mpg_us') return FUEL_US_PER_L100 / l100;
      if (toId === 'mpg_uk') return FUEL_UK_PER_L100 / l100;
    }

    // ─────────────────────────────────────────────
    // BUILD UI
    // ─────────────────────────────────────────────
    function buildCatTabs() {
      document.getElementById('catTabs').innerHTML = CATEGORIES.map(cat => `
        <button
          class="cat-tab${cat.id === currentCatId ? ' active' : ''}"
          data-catid="${cat.id}"
          role="tab"
          aria-selected="${cat.id === currentCatId ? 'true' : 'false'}"
        >${cat.icon} ${cat.name}</button>
      `).join('');
    }

    function buildUnitSelects() {
      const cat = getCat();

      function optionsHtml() {
        const metric   = cat.units.filter(u => u.type === 'metric');
        const imperial = cat.units.filter(u => u.type === 'imperial');
        const other    = cat.units.filter(u => u.type === 'other');
        const mkOpts   = units => units.map(u =>
          `<option value="${u.id}">${u.label} (${u.sym})</option>`
        ).join('');
        return `
          <optgroup label="── Metric ──">${mkOpts(metric)}</optgroup>
          <optgroup label="── Imperial ──">${mkOpts(imperial)}</optgroup>
          ${other.length ? `<optgroup label="── Other ──">${mkOpts(other)}</optgroup>` : ''}
        `;
      }

      const html = optionsHtml();
      const fromSel = document.getElementById('fromUnit');
      const toSel   = document.getElementById('toUnit');
      fromSel.innerHTML = html;
      toSel.innerHTML   = html;
      fromSel.value = cat.defaultFrom;
      toSel.value   = cat.defaultTo;
    }

    function buildRefTable() {
      const cat = getCat();
      document.getElementById('refCatName').textContent = '';
      document.getElementById('refTableBody').innerHTML = cat.references.map((r, i) => `
        <tr data-refindex="${i}">
          <td class="td-label">${r.label}</td>
          <td class="td-metric">${r.metricDisp}</td>
          <td class="td-imperial">${r.imperialDisp}</td>
        </tr>
      `).join('');
    }

    function buildFormula() {
      const cat    = getCat();
      const fromId = document.getElementById('fromUnit').value;
      const toId   = document.getElementById('toUnit').value;
      const from   = cat.units.find(u => u.id === fromId);
      const to     = cat.units.find(u => u.id === toId);
      if (!from || !to) return;

      // Fuel efficiency uses an inverse formula — display it descriptively
      if (cat.id === 'fuel') {
        let fuelHtml;
        if ((fromId === 'mpg_us' && toId === 'mpg_uk') || (fromId === 'mpg_uk' && toId === 'mpg_us')) {
          // Cross-mpg conversion: US ↔ UK gallon ratio
          fuelHtml = `
            <div class="formula-item">
              <span class="formula-direction">mpg (US) → mpg (UK)</span>
              <span class="formula-expr">mpg (UK) = mpg (US) × 1.20095</span>
            </div>
            <div class="formula-item">
              <span class="formula-direction">mpg (UK) → mpg (US)</span>
              <span class="formula-expr">mpg (US) = mpg (UK) ÷ 1.20095</span>
            </div>`;
        } else {
          const usesUK  = fromId === 'mpg_uk' || toId === 'mpg_uk';
          const constant = usesUK ? '282.48' : '235.21';
          const mpgLabel = usesUK ? 'mpg (UK)' : 'mpg (US)';
          fuelHtml = `
            <div class="formula-item">
              <span class="formula-direction">L/100km → ${mpgLabel}</span>
              <span class="formula-expr">${mpgLabel} = ${constant} ÷ L/100km</span>
            </div>
            <div class="formula-item">
              <span class="formula-direction">${mpgLabel} → L/100km</span>
              <span class="formula-expr">L/100km = ${constant} ÷ ${mpgLabel}</span>
            </div>`;
        }
        document.getElementById('formulaRow').innerHTML = fuelHtml;
        return;
      }

      const fwd = smartRound(from.factor / to.factor);
      const rev = smartRound(to.factor / from.factor);

      document.getElementById('formulaRow').innerHTML = `
        <div class="formula-item">
          <span class="formula-direction">${from.sym} → ${to.sym}</span>
          <span class="formula-expr">1 ${from.sym} = ${fmtNum(fwd)} ${to.sym}</span>
        </div>
        <div class="formula-item">
          <span class="formula-direction">${to.sym} → ${from.sym}</span>
          <span class="formula-expr">1 ${to.sym} = ${fmtNum(rev)} ${from.sym}</span>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // EVENTS
    // ─────────────────────────────────────────────
    function setCategory(catId) {
      currentCatId = catId;
      clearAll();
      buildCatTabs();
      buildUnitSelects();
      buildRefTable();
      buildFormula();
      document.getElementById('resultIcon').textContent = getCat().icon;
    }

    function onUnitChange() {
      buildFormula();
      convert();
    }

    function convert() {
      const raw       = document.getElementById('inputVal').value;
      const outputEl  = document.getElementById('outputVal');
      const callout   = document.getElementById('resultCallout');
      const inputEl   = document.getElementById('inputVal');
      const warningEl = document.getElementById('negativeWarning');

      // Empty or non-numeric — reset quietly
      if (raw === '' || isNaN(parseFloat(raw))) {
        outputEl.value = '';
        callout.classList.remove('visible');
        inputEl.classList.remove('field--warning');
        warningEl.classList.remove('visible');
        return;
      }

      const input = parseFloat(raw);

      // Negative value guard
      if (input < 0) {
        inputEl.classList.add('field--warning');
        warningEl.classList.add('visible');
        outputEl.value = '';
        callout.classList.remove('visible');
        return;
      }
      inputEl.classList.remove('field--warning');
      warningEl.classList.remove('visible');

      const cat    = getCat();
      const fromId = document.getElementById('fromUnit').value;
      const toId   = document.getElementById('toUnit').value;
      const from   = cat.units.find(u => u.id === fromId);
      const to     = cat.units.find(u => u.id === toId);
      if (!from || !to) return;

      // Same-unit check
      if (fromId === toId) {
        outputEl.value = fmtNum(input);
        document.getElementById('resultText').textContent =
          `${fmtNum(input)} ${from.sym}  =  ${fmtNum(input)} ${from.sym}`;
        document.getElementById('resultSub').textContent = 'Same unit — no conversion needed.';
        callout.classList.add('visible');
        return;
      }

      // Calculate result
      const result = cat.id === 'fuel'
        ? convertFuel(input, fromId, toId)
        : (input * from.factor) / to.factor;

      outputEl.value = fmtNum(result);
      document.getElementById('resultText').textContent =
        `${fmtNum(input)} ${from.sym}  =  ${fmtNum(result)} ${to.sym}`;
      document.getElementById('resultSub').textContent =
        getContext(input, from, cat);
      callout.classList.add('visible');
    }

    function getContext(value, fromUnit, cat) {
      const base = fromUnit.factor !== null ? value * fromUnit.factor : value;

      if (cat.id === 'length') {
        const m = base;
        if (m < 0.001)    return 'Finer than a human hair.';
        if (m < 0.01)     return 'About the width of a fingernail.';
        if (m < 0.3)      return 'Roughly hand-sized.';
        if (m < 2)        return 'Shorter than a doorway.';
        if (m < 20)       return 'Across a large room.';
        if (m < 200)      return 'A short sprint.';
        if (m < 1000)     return 'A leisurely walk.';
        if (m < 5000)     return 'A decent jog.';
        if (m < 42195)    return 'Less than a full marathon.';
        if (m < 500000)   return 'A long drive between towns.';
        return 'Continent-scale distance.';
      }
      if (cat.id === 'weight') {
        const g = base;
        if (g < 1)        return 'Lighter than a paperclip.';
        if (g < 10)       return 'About the weight of a coin.';
        if (g < 100)      return 'A handful of change.';
        if (g < 500)      return 'About a cup of sugar.';
        if (g < 2000)     return 'A bag of flour.';
        if (g < 10000)    return 'A bag of potatoes.';
        if (g < 100000)   return 'Heavy — gym equipment territory.';
        if (g < 300000)   return 'About the weight of a large motorbike.';
        if (g < 1500000)  return 'About the weight of a small car.';
        if (g < 5000000)  return 'Heavier than most passenger cars.';
        return 'Industrial-scale load.';
      }
      if (cat.id === 'volume') {
        const mL = base;
        if (mL < 5)       return 'Less than a teaspoon.';
        if (mL < 30)      return 'A shot glass.';
        if (mL < 250)     return 'A standard drinking glass.';
        if (mL < 600)     return 'A large drink bottle.';
        if (mL < 2000)    return 'A couple of litres.';
        if (mL < 25000)   return 'A large jerry can or fuel tank.';
        if (mL < 200000)  return 'A small tank or large esky.';
        return 'Swimming pool territory.';
      }
      if (cat.id === 'area') {
        const m2 = base;
        if (m2 < 1)       return 'Smaller than a sheet of paper.';
        if (m2 < 25)      return 'A small room.';
        if (m2 < 200)     return 'A house floor plan.';
        if (m2 < 1000)    return 'A suburban backyard.';
        if (m2 < 10000)   return 'A small sports oval.';
        if (m2 < 500000)  return 'A local park or suburb.';
        if (m2 < 5000000) return 'A small rural property.';
        return 'State or country-scale area.';
      }
      if (cat.id === 'speed') {
        const kmh = base * 3.6; // base is m/s → km/h
        if (kmh < 5)      return 'Slower than a gentle walk.';
        if (kmh < 15)     return 'A brisk walk or gentle jog.';
        if (kmh < 40)     return 'Cycling speed.';
        if (kmh < 60)     return 'City driving speed (AU).';
        if (kmh < 110)    return 'Highway driving speed (AU).';
        if (kmh < 300)    return 'High-speed train territory.';
        if (kmh < 1235)   return 'Approaching the speed of sound.';
        if (kmh < 10000)  return 'Supersonic — faster than sound!';
        return 'Orbital / hypersonic speed.';
      }
      if (cat.id === 'fuel') {
        const l100 = fromUnit.id === 'l100km' ? value
                   : fromUnit.id === 'mpg_us'  ? FUEL_US_PER_L100 / value
                   : FUEL_UK_PER_L100 / value;
        if (l100 < 4)    return 'Exceptional efficiency — electric or hybrid range.';
        if (l100 < 6)    return 'Excellent — small, efficient car.';
        if (l100 < 9)    return 'Good — typical Australian passenger car.';
        if (l100 < 12)   return 'Average — standard SUV or crossover.';
        if (l100 < 16)   return 'Thirsty — large SUV or ute.';
        return 'Very high consumption — heavy vehicle or performance car.';
      }
      return '';
    }

    function useReference(index) {
      const cat = getCat();
      const ref = cat.references[index];
      document.getElementById('fromUnit').value = ref.unitId;
      document.getElementById('inputVal').value = ref.value;
      buildFormula();
      convert();
      document.querySelector('.main').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function swap() {
      const fromSel  = document.getElementById('fromUnit');
      const toSel    = document.getElementById('toUnit');
      const prevFrom = fromSel.value;
      const prevTo   = toSel.value;
      const prevOut  = document.getElementById('outputVal').value;
      fromSel.value = prevTo;
      toSel.value   = prevFrom;
      document.getElementById('inputVal').value = prevOut;
      buildFormula();
      convert();
    }

    function clearAll() {
      document.getElementById('inputVal').value  = '';
      document.getElementById('outputVal').value = '';
      document.getElementById('resultCallout').classList.remove('visible');
      document.getElementById('inputVal').classList.remove('field--warning');
      document.getElementById('negativeWarning').classList.remove('visible');
    }

    function copyResult() {
      const text = document.getElementById('resultText').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    }

    // ─────────────────────────────────────────────
    // INIT — all events wired via addEventListener
    // ─────────────────────────────────────────────
    buildCatTabs();
    buildUnitSelects();
    buildRefTable();
    buildFormula();
    document.getElementById('resultIcon').textContent = getCat().icon;

    // Category tab delegation
    document.getElementById('catTabs').addEventListener('click', e => {
      const btn = e.target.closest('[data-catid]');
      if (btn) setCategory(btn.dataset.catid);
    });

    // Reference table row delegation
    document.getElementById('refTableBody').addEventListener('click', e => {
      const row = e.target.closest('[data-refindex]');
      if (row) useReference(parseInt(row.dataset.refindex, 10));
    });

    // Form controls
    document.getElementById('fromUnit').addEventListener('change', onUnitChange);
    document.getElementById('toUnit').addEventListener('change', onUnitChange);
    document.getElementById('inputVal').addEventListener('input', convert);
    document.getElementById('swapBtn').addEventListener('click', swap);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('copyBtn').addEventListener('click', copyResult);
  </script>
